<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 260">
  <title>DAHO</title>
  <!--
    DAHO Logo
    ─────────────────────────────────
    Colors     → gray: #3b3b3b  |  orange: #e85520
    Bar weight → 54px
    Height     → 232px  (y: 14 → 246)  |  center-y = 130
    ─────────────────────────────────
    D  outer: left bar x 14→68, then true semicircle r=116 (cx=68 cy=130)
              rightmost point = 68+116 = 184
    D  inner: true semicircle r=62 (cx=68 cy=130)
              top=(68,68) bottom=(68,192)  ring=54px ✓
    A  triangle: apex (256,14) base (184,246)→(340,246)
    H  left bar: x 314→368 (overlaps A base)
       right bar: x 422→476
       crossbar:  x 368→422 centered at y=130 (h=44 → y 108→152)
    O  outer circle: cx=648 cy=130 r=116  top=(648,14) bottom=(648,246)
       inner circle: cx=648 cy=130 r=62   top=(648,68) bottom=(648,192)
    ─────────────────────────────────
    Layer order (back to front):
      1. A  — orange triangle
      2. D  — gray with evenodd inner cutout
      3. H  — gray, left bar covers A's right corner
      4. O  — orange ring (evenodd full circles)
  -->

  <!-- ── A — orange solid triangle ──────────────────────────────── -->
  <polygon fill="#e85520" points="256,14 184,246 340,246"/>

  <!-- ── D — dark gray, true semicircle arcs + evenodd cutout ───── -->
  <!--
    Outer: M(14,14) → right to (68,14) → arc CW r=116 to (68,246) → left to (14,246)
    Inner: M(68,68) → arc CW r=62 to (68,192) → implicit line back (Z)
    sweep-flag=1 (clockwise) from top to bottom → curves to the RIGHT ✓
  -->
  <path fill="#3b3b3b" fill-rule="evenodd" d="
    M 14,14 L 68,14
    A 116,116 0 0,1 68,246
    L 14,246 Z

    M 68,68
    A 62,62 0 0,1 68,192
    Z
  "/>

  <!-- ── H — dark gray, left bar overlaps right side of A ────────── -->
  <rect fill="#3b3b3b" x="314" y="14"  width="54" height="232"/>
  <rect fill="#3b3b3b" x="422" y="14"  width="54" height="232"/>
  <rect fill="#3b3b3b" x="368" y="108" width="54" height="44"/>

  <!-- ── O — orange ring via full-circle arc pairs + evenodd ──────── -->
  <!--
    Full circle = two semicircular arcs (start≠end required by SVG)
    outer r=116: (648,14)→CW→(648,246)→CW→(648,14)
    inner r=62:  (648,68)→CW→(648,192)→CW→(648,68)
  -->
  <path fill="#e85520" fill-rule="evenodd" d="
    M 648,14
    A 116,116 0 0,1 648,246
    A 116,116 0 0,1 648,14 Z

    M 648,68
    A 62,62 0 0,1 648,192
    A 62,62 0 0,1 648,68 Z
  "/>

</svg>
