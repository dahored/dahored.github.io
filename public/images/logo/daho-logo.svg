<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 260">
  <title>DAHO</title>
  <!--
    DAHO Logo
    ─────────────────────────────────
    Colors     → gray: #3b3b3b  |  orange: #e85520
    Bar weight → 54px
    Height     → 232px  (y: 14 → 246)
    ─────────────────────────────────
    Layer order (back to front):
      1. A  — orange triangle
      2. D  — gray (inner cutout via evenodd)
      3. H  — gray, left bar clips over A
      4. O  — orange ring (two arcs + evenodd)
  -->

  <!-- ── A — orange solid triangle ──────────────────────────── -->
  <!--  apex (256,14)  base-left (172,246)  base-right (340,246) -->
  <polygon fill="#e85520" points="256,14 172,246 340,246"/>

  <!-- ── D — dark gray bold letterform ──────────────────────── -->
  <!--
    Outer shell: left bar (x 14→68) + D-curve bulging to x≈185
    Inner hole : evenodd cutout, stroke ~54px on all sides
  -->
  <path fill="#3b3b3b" fill-rule="evenodd" d="
    M 14,14 L 68,14
    C 216,14 216,246 68,246
    L 14,246 Z

    M 68,58
    L 68,202
    C 143,202 143,58 68,58 Z
  "/>

  <!-- ── H — dark gray, left bar overlaps right side of A ─────── -->
  <rect fill="#3b3b3b" x="314" y="14" width="54" height="232"/>
  <rect fill="#3b3b3b" x="422" y="14" width="54" height="232"/>
  <rect fill="#3b3b3b" x="368" y="101" width="54" height="44"/>

  <!-- ── O — orange ring (true circles via SVG arcs) ─────────── -->
  <!--
    outer circle: cx=648 cy=130 r=116  →  top=14  bottom=246
    inner circle: cx=648 cy=130 r=62   →  top=68  bottom=192
    Ring thickness ≈ 54px (matches bar weight)
  -->
  <path fill="#e85520" fill-rule="evenodd" d="
    M 648,14
    A 116,116 0 0,1 648,246
    A 116,116 0 0,1 648,14 Z

    M 648,68
    A 62,62 0 0,1 648,192
    A 62,62 0 0,1 648,68 Z
  "/>

</svg>
